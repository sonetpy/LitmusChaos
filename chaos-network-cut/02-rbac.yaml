apiVersion: v1
kind: ServiceAccount
metadata:
  name: network-loss-sa
  namespace: chaos-prod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: network-loss-role
  namespace: chaos-prod
rules:
  - apiGroups: ["", "litmuschaos.io"]
    resources: ["pods", "pods/exec", "pods/log", "events", "chaosengines", "chaosexperiments", "chaosresults"]
    verbs: ["*"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["*"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: network-loss-role-binding
  namespace: chaos-prod
subjects:
  - kind: ServiceAccount
    name: network-loss-sa
    namespace: chaos-prod
roleRef:
  kind: Role
  name: network-loss-role
  apiGroup: rbac.authorization.k8s.io

apiVersion: apps/v1
kind: Deployment
metadata:
  name: network-target
  namespace: chaos-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: network-target
  template:
    metadata:
      labels:
        app: network-target
    spec:
      containers:
      - name: web-app
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: target-service
  namespace: chaos-prod
spec:
  selector:
    app: network-target
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
